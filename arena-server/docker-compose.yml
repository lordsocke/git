# Lokale Abhängigkeiten für die Entwicklung. Postgres = Ledger-Wahrheit,
# Redis = später (Sessions/Rate-Limits/Liga-Fanout, Phase B5+).
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    ports:
      - "5432:5432"
    volumes:
      - arena_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  arena_pg:
